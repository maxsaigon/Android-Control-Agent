services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Persist screenshots
      - ./screenshots:/app/screenshots
      # Mount templates (editable without rebuild)
      - ./app/templates:/app/app/templates
      # Mount config (editable without rebuild)
      - ./config.yaml:/app/config.yaml
    # ADB: use host network to access devices on LAN
    network_mode: host
    restart: unless-stopped
